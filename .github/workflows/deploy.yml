name: Deploy Static Website to S3

on:
  push:
    branches:
      - main # Triggers the deployment on every push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download the repository files to the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Configure AWS credentials using the secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # Change this to your bucket's actual AWS region

    # Step 3: Sync files to S3 bucket
    - name: Deploy to S3
      run: |
        aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete --exclude ".git*" --exclude ".github*"
